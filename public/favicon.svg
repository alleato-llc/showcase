<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- A grid of project tiles — three filled, one open — on the same deep
       purple as the Soroban mark, tying the showcase to that family. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B62D9"/>
      <stop offset="1" stop-color="#5B3C99"/>
    </linearGradient>
  </defs>
  <rect x="8" y="6" width="48" height="52" rx="10" fill="url(#bg)"/>
  <rect x="17" y="17" width="13" height="13" rx="3" fill="#FFFFFF"/>
  <rect x="34" y="17" width="13" height="13" rx="3" fill="#FFFFFF"/>
  <rect x="17" y="34" width="13" height="13" rx="3" fill="#FFFFFF"/>
  <rect x="34" y="34" width="13" height="13" rx="3" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
</svg>
