name: Deploy

# On push to main: publish the landing page → showcase.alleato.dev and the live
# demo (example instance) → demo.showcase.alleato.dev. salpa owns the deploy
# (s3 sync + CloudFront invalidate); two runs, one per site, with dir/bucket
# supplied via $SALPA_DIR / $SALPA_BUCKET (salpa >= 0.1.10). Auth is short-lived
# OIDC (secrets.AWS_SITE_ROLE_ARN — a secret, not a variable, so GitHub
# auto-redacts it everywhere in logs; a manual ::add-mask:: step does not do
# that, since the step's own `env:` block still gets echoed in its log
# preamble before the mask takes effect).
on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "packages/**"
      - "examples/**"
      - "schema/**"
      - "package.json"
      - "package-lock.json"
      - "salpa.yaml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write # assume the deploy role via OIDC
  contents: read
  packages: read # pull salpa from ghcr

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    name: Build + deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build the live demo (example instance)
        run: |
          npm ci
          SHOWCASE_DATA="$PWD/examples/default" npm run build

      - uses: oras-project/setup-oras@v1
      - name: Fetch salpa
        run: |
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras pull ghcr.io/alleato-llc/salpa:0.1.10
          chmod +x salpa-linux-amd64
          sudo mv salpa-linux-amd64 /usr/local/bin/salpa

      - name: Configure deploy credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SITE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy landing page
        env:
          SALPA_DIR: landing
          SALPA_BUCKET: showcase.alleato.dev
        run: salpa deploy

      - name: Deploy live demo
        env:
          SALPA_DIR: packages/site/dist
          SALPA_BUCKET: demo.showcase.alleato.dev
        run: salpa deploy
