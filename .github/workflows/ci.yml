name: CI

# Build + vet the Go tool and build the Astro site (with the example instance)
# on every branch/PR. Deploys happen separately on main (deploy.yml).
on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  tool:
    name: Go tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: tool/go.sum
      - name: Build, vet, test (core + CLI)
        working-directory: tool
        run: |
          go build ./internal/... ./cmd/...
          go vet ./internal/... ./cmd/...
          go test ./internal/... ./cmd/...

  site:
    name: Site + GUI frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Build the site (example instance)
        run: |
          npm ci
          npm run build
      - name: Type-check + build the GUI frontend
        working-directory: tool/gui/frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run build
